[project]
id      = "masm"
name    = "MASM"
version = "0.1.0"
dir_src = "src"
dir_out = "out"
dir_dep = "dep"
target  = "native"
type    = "exe"

[targets.linux]
os         = "linux"
isa        = "x86_64"
abi        = "sysv64"
mode       = "executable"
entrypoint = "main.mach"
artifacts  = "linux"
binary     = "linux/bin/masm"

[deps.mach-std]
type    = "remote"
path    = "https://github.com/octalide/mach-std"
version = "branch/dev"
